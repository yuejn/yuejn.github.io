<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>. . .</title>
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
        line-height: 1.8;
      }

      body {
        font: 130% "Garamond", serif;
        background: #f4f4f0;
        color: #222;
        padding: 1em;
      }

      p,
      ul {
        margin-bottom: 1.5em;
      }

      h2 {
        font-size: 110%;
      }

      #wrapper {
        width: calc(90% - 2em);
        padding: 2em;
      }

      @media screen and (min-width: 768px) {
        #wrapper {
          width: 50%;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <main>
        <section>
          <p>To <em>err</em> is to human; to <em>arr</em> is to pirate.</p>
        </section>

        <section>
          <h2>How to make <em>ajitsuke tamago</em></h2>
          <p>
            Gently peel soft boiled eggs and cover them in a 2 tbsp soy sauce, 2
            tbsp mirin, and 3 tbsp water marinade in a refrigerated sealed
            container overnight. 🥚
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
